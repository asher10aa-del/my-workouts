    <script>
        (function() {
            var canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            var ctx = canvas.getContext('2d');
            
            // רקע שחור עמוק
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, 256, 256);
            
            // משקולת לבנה וחלקה
            ctx.fillStyle = '#ffffff';
            
            // פונקציית עזר לציור מלבן מעוגל שנתמכת בכל המכשירים
            function fillRoundRect(x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.fill();
            }

            // ציור חלקי המשקולת
            fillRoundRect(98, 113, 60, 30, 5);   // ידית אמצעית
            fillRoundRect(68, 68, 30, 120, 10);  // משקולת פנימית שמאל
            fillRoundRect(158, 68, 30, 120, 10); // משקולת פנימית ימין
            fillRoundRect(48, 88, 20, 80, 8);    // משקולת חיצונית שמאל
            fillRoundRect(188, 88, 20, 80, 8);   // משקולת חיצונית ימין

            var dataURL = canvas.toDataURL('image/png');

            // הזרקת הלוגו ישירות להגדרות הדפדפן לפני טעינת המסך
            var appleIcon = document.createElement('link');
            appleIcon.rel = 'apple-touch-icon';
            appleIcon.href = dataURL;
            document.head.appendChild(appleIcon);

            var standardIcon = document.createElement('link');
            standardIcon.rel = 'icon';
            standardIcon.type = 'image/png';
            standardIcon.href = dataURL;
            document.head.appendChild(standardIcon);
        })();
    </script>

        const DayInfoModal = ({ dateInfo, onClose, history, categories, schedule, onUpdateStatus }) => {

        // --- קומפוננטת טיימר מבודדת כדי למנוע רינדור מחדש של כל האפליקציה ---
        const WorkoutTimer = () => {
            const [timerOpen, setTimerOpen] = useState(false);
            const [timeLeft, setTimeLeft] = useState(0);
            const [timerActive, setTimerActive] = useState(false);

            useEffect(() => {
                let interval;
                if (timerActive && timeLeft > 0) interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
                else if (timeLeft === 0) { setTimerActive(false); clearInterval(interval); }
                return () => clearInterval(interval);
            }, [timerActive, timeLeft]);

            const startTimer = (seconds) => {
                setTimeLeft(seconds);
                setTimerActive(true);
                setTimerOpen(false);
            };

            return (
                <>
                    <div className="fixed bottom-10 left-8 z-50">
                        {timeLeft > 0 ? (
                            <button onClick={() => setTimerOpen(true)} className="w-20 h-20 bg-blue-600 rounded-[2rem] flex flex-col items-center justify-center shadow-lg border-2 border-black animate-pulse">

                            </button>

        const HomeView = ({

        }) => {
            const today = new Date();
            const todayKey = today.toISOString().split('T')[0];
            const dayName = today.toLocaleDateString('he-IL', { weekday: 'long' });
            const plannedCategory = categories.find(c => c.id === DEFAULT_SCHEDULE[today.getDay()]);
            const [motivationIndex] = useState(Math.floor(Math.random() * MOTIVATIONS.length));
            const [calendarDate, setCalendarDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
            const [selectedDateInfo, setSelectedDateInfo] = useState(null);

            const displayCategories = manageMode ? draftCategories : categories;

            const enterManageMode = () => { 
                setDraftCategories(structuredClone(categories)); 
                setManageMode(true); 
            };
            const moveCategory = (index, dir) => {
                const newCats = [...draftCategories];
                if (dir === -1 && index > 0) [newCats[index-1], newCats[index]] = [newCats[index], newCats[index-1]];
                else if (dir === 1 && index < newCats.length - 1) [newCats[index+1], newCats[index]] = [newCats[index], newCats[index+1]];
                setDraftCategories(newCats);
            };
            const addCategory = () => {
                const name = prompt("הכנס שם לאימון החדש:");
                if (name) setDraftCategories([...draftCategories, { id: crypto.randomUUID(), name, hex: "#a855f7", icon: "dumbbell", exercises: [] }]);
            };
            const deleteCategory = (index) => {
                if (confirm(`למחוק את האימון "${draftCategories[index].name}"?`)) {
                    const newCats = [...draftCategories]; newCats.splice(index, 1); setDraftCategories(newCats);
                }
            };
            const renameCategory = (index) => {
                const name = prompt("שם חדש לאימון:", draftCategories[index].name);
                if (name) { const newCats = [...draftCategories]; newCats[index].name = name; setDraftCategories(newCats); }
            };

            const updateRetroStatus = (dateStr, status, categoryId) => {
                setHistory(prev => {
                    const newHist = { ...prev };
                    if (!status) delete newHist[dateStr];
                    else newHist[dateStr] = { type: categoryId, status: status };
                    return newHist;
                });
                setSelectedDateInfo(null); 
            };

            const exportData = () => {
                const dataToExport = { categories, history };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataToExport));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "workout_backup.json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (importedData.categories && importedData.history) {
                            setCategories(importedData.categories);
                            setHistory(importedData.history);
                            alert("הנתונים שוחזרו בהצלחה! רענן את האפליקציה.");
                        } else {
                            alert("קובץ לא חוקי או שגיאה בנתונים.");
                        }
                    } catch (error) {
                        alert("שגיאה בקריאת הקובץ.");
                    }
                };
                reader.readAsText(file);
            };

            const daysInMonth = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 0).getDate();
            const firstDay = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), 1).getDay();
            const monthName = calendarDate.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });

            return (
                <div className="flex flex-col items-center gap-8 p-6" dir="rtl">
                    <div className="w-full flex justify-between items-center mt-4">
                        <div className="w-12"></div>
                        <h1 className="text-xl font-bold text-white italic text-center px-4 flex-1">"{MOTIVATIONS[motivationIndex]}"</h1>
                        {!manageMode && <button onClick={enterManageMode} className="p-3 bg-white/5 rounded-full text-gray-400"><Icon name="settings" size={20} /></button>}
                    </div>

                    <div className="text-center bg-gray-900/80 p-6 rounded-3xl border border-white/5 w-full max-w-sm shadow-xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-emerald-500"></div>
                        <p className="text-gray-500 text-xs mb-1 uppercase tracking-widest font-bold">היום {dayName}</p>
                        <p className="text-2xl font-black text-blue-400">אימון: {plannedCategory?.name || "מנוחה"}</p>
                    </div>

                    <div className="grid w-full gap-4 max-w-sm">
                        {displayCategories.map((cat, index) => (
                            <div key={cat.id} className="relative flex items-center gap-2">
                                {manageMode && (
                                    <div className="flex flex-col gap-1">
                                        <button onClick={() => moveCategory(index, -1)} className="p-2 bg-white/5 rounded-lg"><Icon name="arrowUp" size={16}/></button>
                                        <button onClick={() => moveCategory(index, 1)} className="p-2 bg-white/5 rounded-lg"><Icon name="arrowDown" size={16}/></button>
                                    </div>
                                )}
                                <button onClick={() => manageMode ? renameCategory(index) : setActivePage(cat.id)} className={`flex-1 flex items-center justify-between p-6 rounded-[2.5rem] transition-all shadow-lg border ${manageMode ? 'border-blue-500 bg-blue-900/10' : 'border-white/5 bg-gray-900'}`}>
                                    {manageMode ? <Icon name="edit2" size={20} className="text-blue-400" /> : <Icon name="arrowLeft" size={20} className="text-white/40" />}
                                    <div className="flex items-center gap-5 text-white">
                                        <span className="text-xl font-black">{cat.name}</span>
                                        <span className="p-3 bg-black/40 rounded-2xl" style={{color: cat.hex}}><Icon name={cat.icon} size={24} /></span>
                                    </div>
                                </button>
                                {manageMode && <button onClick={() => deleteCategory(index)} className="p-4 bg-rose-500/10 text-rose-500 rounded-2xl h-full ml-1"><Icon name="trash2" size={20}/></button>}
                            </div>
                        ))}
                        {manageMode && (
                            <button onClick={addCategory} className="w-full p-6 border-2 border-dashed border-white/10 rounded-[2.5rem] text-gray-400 font-bold flex flex-col items-center gap-2">
                                <Icon name="plus" size={24} /> הוסף אימון חדש
                            </button>
                        )}
                        
                        {/* אזור גיבוי נתונים */}
                        {manageMode && (
                            <div className="mt-4 p-6 bg-gray-900 border border-white/10 rounded-3xl space-y-4">
                                <h3 className="font-bold text-white mb-2 text-center">גיבוי נתונים</h3>
                                <div className="flex gap-4">
                                    <button onClick={exportData} className="flex-1 bg-blue-600/20 text-blue-400 p-3 rounded-xl font-bold flex flex-col items-center gap-1 border border-blue-500/30">
                                        <Icon name="arrowDown" size={20} /> גיבוי למכשיר
                                    </button>
                                    <label className="flex-1 bg-emerald-600/20 text-emerald-400 p-3 rounded-xl font-bold flex flex-col items-center gap-1 border border-emerald-500/30 cursor-pointer">
                                        <Icon name="arrowUp" size={20} /> שחזור מקובץ
                                        <input type="file" accept=".json" onChange={importData} className="hidden" />
                                    </label>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="w-full max-w-sm mt-4">
                        <div className="bg-gray-900/80 p-6 rounded-[2.5rem] border border-white/5 shadow-xl" dir="rtl">
                            <div className="flex justify-between items-center mb-6 px-2">
                                <button onClick={() => setCalendarDate(new Date(calendarDate.getFullYear(), calendarDate.getMonth() - 1, 1))} className="p-2 bg-white/5 rounded-full"><Icon name="chevronRight" size={16}/></button>
                                <h3 className="font-black text-lg text-white/90">{monthName}</h3>
                                <button onClick={() => setCalendarDate(new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 1))} className="p-2 bg-white/5 rounded-full"><Icon name="chevronLeft" size={16}/></button>
                            </div>
                            <div className="grid grid-cols-7 gap-2 text-center">
                                {['א','ב','ג','ד','ה','ו','ש'].map(d => <div key={d} className="text-[11px] font-bold text-gray-500 uppercase">{d}</div>)}
                                {[...Array(firstDay)].map((_, i) => <div key={`empty-${i}`} />)}
                                {[...Array(daysInMonth)].map((_, i) => {
                                    const dNum = i + 1;
                                    const cellD = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), dNum);
                                    const dStr = cellD.toISOString().split('T')[0];
                                    const record = history[dStr];
                                    const planned = categories.find(c => c.id === DEFAULT_SCHEDULE[cellD.getDay()]);
                                    let cellStyle = "bg-gray-800/30 text-gray-500 cursor-pointer transition-all";
                                    let IconComp = null; let finalBg = null;
                                    
                                    if (record) {
                                        finalBg = categories.find(c => c.id === record.type)?.hex || planned?.hex || "#3b82f6";
                                        cellStyle = record.status === 'done' ? "text-white scale-105" : "bg-rose-500 text-white";
                                        IconComp = record.status === 'done' ? <Icon name="check" size={12} className="mt-0.5" /> : <Icon name="x" size={12} className="mt-0.5" />;
                                    } else if (dNum === today.getDate() && calendarDate.getMonth() === today.getMonth()) {
                                        cellStyle = "border border-blue-500 text-blue-400 font-black";
                                    }
                                    return (
                                        <div key={dNum} onClick={() => setSelectedDateInfo({ date: cellD })} style={{ backgroundColor: finalBg }} className={`aspect-square flex flex-col items-center justify-center rounded-xl text-[12px] font-bold ${cellStyle}`}>
                                            {dNum} {IconComp ? IconComp : (planned && <div style={{ backgroundColor: planned.hex }} className="w-1.5 h-1.5 rounded-full mt-1 opacity-80" />)}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    {selectedDateInfo && <DayInfoModal dateInfo={selectedDateInfo} onClose={() => setSelectedDateInfo(null)} history={history} categories={categories} schedule={DEFAULT_SCHEDULE} onUpdateStatus={updateRetroStatus} />}
                </div>
            );
        };

        // --- קומפוננטת מסך אימון ---
        const WorkoutDetailView = ({
            activePage, categories, history, manageMode, draftCategories,
            setActivePage, setManageMode, setDraftCategories, setHistory
        }) => {
            const todayKey = new Date().toISOString().split('T')[0];
            const displayCategories = manageMode ? draftCategories : categories;
            const category = displayCategories.find(c => c.id === activePage);
            const todayRec = history[todayKey];
            const [editingExercise, setEditingExercise] = useState(null);

            if (!category) return null;

            const enterManageMode = () => { setDraftCategories(structuredClone(categories)); setManageMode(true); };
            
            const moveExercise = (index, dir) => {
                const newCats = [...draftCategories];
                const catIdx = newCats.findIndex(c => c.id === activePage);
                const newExs = [...newCats[catIdx].exercises];
                if (dir === -1 && index > 0) [newExs[index-1], newExs[index]] = [newExs[index], newExs[index-1]];
                else if (dir === 1 && index < newExs.length - 1) [newExs[index+1], newExs[index]] = [newExs[index], newExs[index+1]];
                newCats[catIdx].exercises = newExs; setDraftCategories(newCats);
            };

            const addExercise = () => {
                const newCats = [...draftCategories];
                const catIdx = newCats.findIndex(c => c.id === activePage);
                const newEx = { id: crypto.randomUUID(), name: "תרגיל חדש", sets: 3, reps: 10, weight: "0" };
                newCats[catIdx].exercises.push(newEx); setDraftCategories(newCats); setEditingExercise(newEx);
            };

            const deleteExercise = (id) => {
                if(confirm("למחוק תרגיל זה?")){
                    const newCats = [...draftCategories];
                    const catIdx = newCats.findIndex(c => c.id === activePage);
                    newCats[catIdx].exercises = newCats[catIdx].exercises.filter(e => e.id !== id);
                    setDraftCategories(newCats);
                }
            };

            const handleSaveExerciseModal = (updatedEx) => {
                if (manageMode) {
                    const newCats = [...draftCategories];
                    const catIdx = newCats.findIndex(c => c.id === activePage);
                    newCats[catIdx].exercises = newCats[catIdx].exercises.map(e => e.id === updatedEx.id ? updatedEx : e);
                    setDraftCategories(newCats);
                }
                setEditingExercise(null);
            };

            const updateRetroStatus = (dateStr, status, categoryId) => {
                setHistory(prev => {
                    const newHist = { ...prev };
                    if (!status) delete newHist[dateStr];
                    else newHist[dateStr] = { type: categoryId, status: status };
                    return newHist;
                });
            };

            return (
                <div className="p-6 pb-32" dir="rtl">
                    <div className="flex justify-between items-center mb-8">
                        {!manageMode ? (
                            <button onClick={() => setActivePage("home")} className="flex items-center gap-2 text-gray-400">
                                <Icon name="chevronRight" size={24} />
                                <span className="font-bold text-lg">חזרה לראשי</span>
                            </button>
                        ) : (
                            <span className="font-bold text-blue-400 px-2 py-1 bg-blue-500/10 rounded-lg">מצב עריכה מופעל</span>
                        )}
                        {!manageMode && <button onClick={enterManageMode} className="p-3 bg-white/5 rounded-full text-gray-400"><Icon name="settings" size={20} /></button>}
                    </div>

                    <div className="mb-8">
                        <p className="text-blue-500 text-sm font-bold mb-1 uppercase">אימון נוכחי</p>
                        <h2 className="text-4xl font-black text-white">{category.name}</h2>
                    </div>

                    {!manageMode && (
                        <div className="flex gap-4 mb-10">
                            <button onClick={() => updateRetroStatus(todayKey, 'done', activePage)} className={`flex-1 flex flex-col items-center justify-center py-5 rounded-[2.5rem] border transition-all ${todayRec?.status === 'done' && todayRec?.type === activePage ? 'bg-emerald-600 border-emerald-500 text-white scale-105 shadow-lg' : 'bg-gray-900/60 border-white/5 text-gray-400'}`}>
                                <Icon name="check" size={24} className="mb-1" />
                                <span className="font-black text-xs">סיימתי היום</span>
                            </button>
                            <button onClick={() => updateRetroStatus(todayKey, 'missed', activePage)} className={`flex-1 flex flex-col items-center justify-center py-5 rounded-[2.5rem] border transition-all ${todayRec?.status === 'missed' && todayRec?.type === activePage ? 'bg-rose-600 border-rose-500 text-white scale-105 shadow-lg' : 'bg-gray-900/60 border-white/5 text-gray-400'}`}>
                                <Icon name="x" size={24} className="mb-1" />
                                <span className="font-black text-xs">דילגתי היום</span>
                            </button>
                        </div>
                    )}

                    <div className="space-y-4">
                        {category.exercises.map((ex, idx) => (
                            <div key={ex.id} className="flex gap-2">
                                {manageMode && (
                                    <div className="flex flex-col gap-1 justify-center">
                                        <button onClick={() => moveExercise(idx, -1)} className="p-2 bg-white/5 rounded-lg"><Icon name="arrowUp" size={16}/></button>
                                        <button onClick={() => moveExercise(idx, 1)} className="p-2 bg-white/5 rounded-lg"><Icon name="arrowDown" size={16}/></button>
                                    </div>
                                )}
                                <div className={`flex-1 p-6 rounded-[2rem] border relative overflow-hidden flex justify-between items-center ${manageMode ? 'bg-blue-900/10 border-blue-500/50' : 'bg-gray-900/80 border-white/5'}`}>
                                    <div className="absolute top-0 right-0 w-1.5 h-full opacity-50" style={{backgroundColor: category.hex}}></div>
                                    <div className="space-y-2 flex-1">
                                        <h4 className="font-black text-xl text-white/90 pr-2">{ex.name}</h4>
                                        <div className="flex gap-6 text-sm pr-2">
                                            <div className="flex flex-col"><span className="text-[10px] text-gray-500 font-bold uppercase">סטים</span><span className="text-white font-black text-lg">{ex.sets}</span></div>
                                            <div className="flex flex-col"><span className="text-[10px] text-gray-500 font-bold uppercase">חזרות</span><span className="text-white font-black text-lg">{ex.reps}</span></div>
                                            <div className="flex flex-col"><span className="text-[10px] font-bold uppercase" style={{color: category.hex}}>משקל</span><span className="text-white font-black text-lg">{ex.weight} <small className="text-[10px]">ק"ג</small></span></div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-2">
                                        {manageMode && (
                                            <>
                                                <button onClick={() => setEditingExercise(ex)} className="p-3 text-blue-400 bg-blue-500/10 rounded-2xl"><Icon name="edit2" size={18} /></button>
                                                <button onClick={() => deleteExercise(ex.id)} className="p-3 text-rose-500 bg-rose-500/10 rounded-2xl"><Icon name="trash2" size={18} /></button>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                        {manageMode && (
                            <button onClick={addExercise} className="w-full mt-4 p-6 border-2 border-dashed border-white/10 rounded-[2rem] text-gray-400 font-bold flex flex-col items-center gap-2">
                                <Icon name="plus" size={24} /> הוסף תרגיל חדש
                            </button>
                        )}
                    </div>
                    {editingExercise && <ExerciseEditModal exercise={editingExercise} onSave={handleSaveExerciseModal} onClose={() => setEditingExercise(null)} />}
                </div>
            );
        };

        // --- קומפוננטת העל המנהלת את המצב ---
        function App() {
            const [activePage, setActivePage] = useState("home"); 
            const [categories, setCategories] = useState(() => JSON.parse(localStorage.getItem('workout_v16_data')) || DEFAULT_CATEGORIES);
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('workout_v16_history')) || {});
            
            const [manageMode, setManageMode] = useState(false);
            const [draftCategories, setDraftCategories] = useState(null);

            useEffect(() => { localStorage.setItem('workout_v16_data', JSON.stringify(categories)); }, [categories]);
            useEffect(() => { localStorage.setItem('workout_v16_history', JSON.stringify(history)); }, [history]);

            const saveManageMode = () => { setCategories(draftCategories); setManageMode(false); };
            const cancelManageMode = () => { setManageMode(false); setDraftCategories(null); };

            return (
                <div className="min-h-screen">
                    <main className={`relative z-10 max-w-lg mx-auto min-h-screen ${manageMode ? 'pb-32' : 'pb-10'}`}>
                        {activePage === "home" ? (
                            <HomeView 
                                categories={categories} history={history} manageMode={manageMode} draftCategories={draftCategories}
                                setManageMode={setManageMode} setDraftCategories={setDraftCategories} setActivePage={setActivePage}
                                setCategories={setCategories} setHistory={setHistory}
                            />
                        ) : (
                            <WorkoutDetailView 
                                activePage={activePage} categories={categories} history={history} manageMode={manageMode} draftCategories={draftCategories}
                                setActivePage={setActivePage} setManageMode={setManageMode} setDraftCategories={setDraftCategories} setHistory={setHistory}
                            />
                        )}
                    </main>

                    {!manageMode && <WorkoutTimer />}
                    
                    {manageMode && (
                        <div className="fixed bottom-0 left-0 w-full p-6 bg-[#0a0a0a] border-t border-white/10 z-[150] flex gap-4 animate-slideUp" dir="rtl">
                            <button onClick={saveManageMode} className="flex-1 bg-emerald-600 text-white p-4 rounded-2xl font-black flex items-center justify-center gap-2 shadow-lg">
                                <Icon name="check" size={24}/> <span className="text-sm font-black">שמור שינויים</span>
                            </button>
                            <button onClick={cancelManageMode} className="flex-1 bg-gray-800 text-white p-4 rounded-2xl font-black flex items-center justify-center gap-2 shadow-lg">
                                <Icon name="x" size={24}/> <span className="text-sm font-black">ביטול</span>
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
